    <rect x="84" y="52" width="20" height="20" rx="3"/>
    <rect x="24" y="78" width="20" height="20" rx="3"/>
    <rect x="54" y="78" width="20" height="20" rx="3"/>
    <rect x="84" y="78" width="20" height="20" rx="3"/>
    <rect x="24" y="104" width="80" height="14" rx="3"/>
  </g>
