<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="220" height="140" viewBox="0 0 220 140">
  <!-- AltSolver card banner · 220×140 -->

  <!-- White background -->
  <rect width="220" height="140" fill="#ffffff"/>

  <!-- Logo tile (left side) -->
  <g transform="translate(18, 30)">
    <rect width="80" height="80" rx="14" fill="#1a73e8"/>
    <!-- Sigma -->
    <text x="25" y="58" font-family="system-ui, Georgia, serif" font-size="53" font-weight="700" fill="#ffffff">Σ</text>
    <!-- Star -->
    <g transform="translate(55, 24)">
      <polygon
        points="0,-7 2.05,-2.16 7,-2.16 3.04,1.46 4.32,6.5 0,3.7 -4.32,6.5 -3.04,1.46 -7,-2.16 -2.05,-2.16"
        fill="#FBBC04"
        stroke="#ffffff"
        stroke-width="0.9"
        stroke-linejoin="round"
      />
    </g>
  </g>

  <!-- Wordmark -->
  <text x="116" y="74" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#202124">AltSolver</text>

  <!-- Tagline -->
  <text x="116" y="92" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#5f6368">Solver para Sheets</text>
</svg>
