<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- AltSolver logo · Variant C: feasible region + optimum -->
  <rect x="8" y="8" width="112" height="112" rx="22" fill="#1a73e8"/>

  <!-- Axes (white) -->
  <line x1="28" y1="100" x2="100" y2="100" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="100" x2="28" y2="28" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Feasible region polygon (light blue fill) -->
  <polygon
    points="28,100 80,100 64,72 28,80"
    fill="rgba(255,255,255,0.28)"
    stroke="rgba(255,255,255,0.6)"
    stroke-width="1.5"
  />

  <!-- Constraint line going up to top-right (orange-ish, for contrast) -->
  <line x1="28" y1="80" x2="80" y2="100" stroke="#FBBC04" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="68" x2="100" y2="92" stroke="#34A853" stroke-width="3" stroke-linecap="round"/>

  <!-- Optimum star at the polygon vertex (64, 72) -->
  <g transform="translate(64, 72)">
    <polygon
      points="0,-10 3,-3 10,-3 4,2 6,9 0,5 -6,9 -4,2 -10,-3 -3,-3"
      fill="#ffffff"
      stroke="#1a73e8"
      stroke-width="1.5"
      stroke-linejoin="round"
    />
  </g>
</svg>
